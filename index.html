<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0F1729" />
  <meta name="description" content="VHYX — Codex do Operador. Evolução biométrica em mundo pós-Colapso." />
  <title>VHYX · CODEX</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fontes (Pretendard / Noto Sans KR / Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&family=Russo+One&family=Cinzel:wght@600;800&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind via CDN (mantém zero-build) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['"Noto Sans KR"', 'Inter', 'system-ui', 'sans-serif'],
            sans: ['Inter', '"Noto Sans KR"', 'system-ui', 'sans-serif'],
            kombat: ['"Russo One"', '"Cinzel"', 'Impact', 'system-ui', 'sans-serif'],
          },
          colors: {
            ink: '#1A1A2E',
            paper: '#FBFAF7',
            navy: '#0F1729',
            pink: '#FFB7C5',
            lavender: '#B7B5FF',
            mint: '#A8E6CF',
            sun: '#FFD8A8',
            iron: '#8E8E93',
            bronze: '#C99466',
            silver: '#C0C0D0',
            gold: '#E8C56B',
            platinum: '#9BD9D6',
            diamond: '#7BB8FF',
            // Mortal Kombat accents — usados com moderação
            blood: '#B8242E',
            ember: '#E84A1A',
            kgold: '#D6A93E',
          },
          boxShadow: {
            soft: '0 2px 12px rgba(26,26,46,0.06), 0 1px 3px rgba(26,26,46,0.04)',
            pop: '0 8px 28px rgba(26,26,46,0.12)',
            neu: 'inset 2px 2px 6px rgba(26,26,46,0.06), inset -2px -2px 6px rgba(255,255,255,0.9)',
          },
          animation: {
            'pop-in': 'popIn 320ms cubic-bezier(.2,.9,.3,1.4)',
            'fade-up': 'fadeUp 280ms ease-out',
            'shake': 'shake 380ms ease-in-out',
          },
          keyframes: {
            popIn: {
              '0%':   { transform: 'scale(.85)', opacity: 0 },
              '100%': { transform: 'scale(1)',   opacity: 1 },
            },
            fadeUp: {
              '0%':   { transform: 'translateY(8px)', opacity: 0 },
              '100%': { transform: 'translateY(0)',   opacity: 1 },
            },
            shake: {
              '0%,100%': { transform: 'translateX(0)' },
              '25%':     { transform: 'translateX(-3px)' },
              '75%':     { transform: 'translateX(3px)' },
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="font-sans bg-paper text-ink dark:bg-navy dark:text-paper antialiased min-h-screen">
  <!-- App root (montagem feita pelo app.js) -->
  <div id="app" class="max-w-md mx-auto pb-28"></div>

  <!-- Barra de navegação inferior -->
  <nav
    id="tabbar"
    class="fixed bottom-0 inset-x-0 z-40 max-w-md mx-auto px-3 pb-3 pt-2
           bg-paper/95 dark:bg-navy/95 backdrop-blur border-t border-ink/5 dark:border-paper/5"
  ></nav>

  <!-- Container de toasts/efeitos -->
  <div id="fx" class="fixed inset-0 pointer-events-none z-50"></div>
  <div id="modal-root" class="fixed inset-0 z-50 hidden"></div>

  <!-- Firebase: Auth + Firestore (SDK modular v10 via CDN) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
    import {
      getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
      onAuthStateChanged, signOut, updateProfile,
      deleteUser, EmailAuthProvider, reauthenticateWithCredential
    } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';
    import {
      initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
      doc, getDoc, setDoc, deleteDoc,
      collection, getDocs, query, where, orderBy, limit
    } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyASZf6rAKXL2EgUGhIQlbA_R0m_5YLkyGU",
      authDomain: "finitess.firebaseapp.com",
      projectId: "finitess",
      storageBucket: "finitess.firebasestorage.app",
      messagingSenderId: "883913187931",
      appId: "1:883913187931:web:7967f6fe5afdb842f4957e",
      measurementId: "G-K3XRG7GVEH"
    };

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    // Firestore com cache persistente (offline-first)
    const db = initializeFirestore(fbApp, {
      localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }),
    });

    // Expõe pra o app.js
    window.QuestCloud = {
      available: true,
      auth, db,
      createUserWithEmailAndPassword, signInWithEmailAndPassword,
      onAuthStateChanged, signOut, updateProfile,
      deleteUser, EmailAuthProvider, reauthenticateWithCredential,
      doc, getDoc, setDoc, deleteDoc,
      collection, getDocs, query, where, orderBy, limit,
    };
    window.dispatchEvent(new Event('quest-cloud-ready'));
  </script>

  <script src="app.js" type="module"></script>
  <script>
    // Registro do service worker (PWA) + auto-reload em nova versão.
    // O SW novo (skipWaiting + clients.claim) toma controle assim que instalado.
    // O 'controllerchange' dispara → recarregamos UMA vez pra pegar todo o
    // bundle atualizado. Guard com sessionStorage pra evitar loop infinito.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (sessionStorage.getItem('__sw_reloaded__') === '1') return;
        sessionStorage.setItem('__sw_reloaded__', '1');
        window.location.reload();
      });
      // Limpa o flag quando o user navega manualmente (próxima carga "fresca")
      window.addEventListener('beforeunload', () => {
        // Não limpa aqui — só queremos zerar quando a sessão fechar de fato.
      });
    }
  </script>
</body>
</html>
